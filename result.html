<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figu Lounge | Result</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="top-header">
      <div class="container header-inner">
        <div class="header-row">
          <p class="logo">FIGU LOUNGE</p>
          <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="kuji.html">Kuji</a>
            <a href="mypage.html" class="active">My Lounge</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="container page">
      <p class="kicker">URL /result/{order_id}</p>
      <section id="result-root" class="panel"></section>
    </main>

    <footer class="container footer">Figma Frame: Result</footer>

    <script src="assets/js/mock-data.js"></script>
    <script>
      const { getOrders } = window.FIGU;
      const orderId = new URLSearchParams(location.search).get('orderId');
      const order = getOrders().find((v) => v.orderId === orderId);
      const root = document.getElementById('result-root');

      if (!order) {
        root.innerHTML = '<h1>결과를 찾을 수 없습니다.</h1><p class="muted">다시 추첨을 진행해주세요.</p>';
      } else {
        const rankText = order.grade === 'A' ? 'A Prize' : `${order.grade} Prize`;
        root.innerHTML = `
          <h1>🎉 Congratulations</h1>
          <p class="muted">You won</p>
          <div class="result-highlight">${rankText} · ${order.reward}</div>
          <div class="panel" style="margin-top:12px">
            <p class="muted">Item Image Placeholder</p>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
            <a class="btn" href="mypage.html">Save to Lounge</a>
            <a class="btn ghost" href="shipping.html">Ship Now</a>
          </div>
        `;
      }
    </script>
  </body>
</html>
