<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figu Lounge | 결과</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body data-page="result">
    <header class="top-header"><div class="container header-inner"><p class="brand-title">Figu Lounge</p></div></header>
    <main class="container page">
      <section id="result-root" class="panel"></section>
    </main>

    <script src="assets/js/mock-data.js"></script>
    <script>
      const { getOrders } = window.FIGU;
      const orderId = new URLSearchParams(location.search).get('orderId');
      const order = getOrders().find((v) => v.orderId === orderId);
      const root = document.getElementById('result-root');
      if (!order) {
        root.innerHTML = '<h1>결과 정보를 찾을 수 없습니다.</h1>';
      } else {
        root.innerHTML = `
          <p class="kicker">결과 페이지</p>
          <h1>${order.productTitle}</h1>
          <p class="result-badge">${order.grade}상 · ${order.reward}</p>
          <p class="muted" style="margin-top:10px">주문번호 ${order.orderId}</p>
          <div class="cta-row" style="margin-top:14px">
            <a class="btn" href="mypage.html">보관함으로 이동</a>
            <a class="btn ghost" href="shipping.html">배송 요청하기</a>
          </div>
        `;
      }
    </script>
      <script src="assets/js/layout.js"></script>
  </body>
</html>
