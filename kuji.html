<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figu Lounge | Kuji List</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="top-header">
      <div class="container header-inner">
        <div class="header-row">
          <p class="logo">FIGU LOUNGE</p>
          <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="kuji.html" class="active">Kuji</a>
            <a href="help.html">Support</a>
          </nav>
          <div class="header-tools">
            <input class="search-box" id="keyword" placeholder="Search Kuji" />
            <a class="tool-chip" href="mypage.html">My Lounge</a>
            <span class="tool-chip">Cart</span>
          </div>
        </div>
      </div>
    </header>

    <main class="container page">
      <p class="kicker">URL /kuji</p>
      <h1>Kuji List</h1>
      <section class="list-layout">
        <aside class="panel">
          <div class="filter-item">
            <h4>Series</h4>
            <label><input type="radio" name="series" value="" checked /> All</label>
            <label><input type="radio" name="series" value="anime" /> Anime</label>
            <label><input type="radio" name="series" value="game" /> Game</label>
            <label><input type="radio" name="series" value="movie" /> Movie</label>
          </div>
          <div class="filter-item">
            <h4>Price</h4>
            <label><input type="radio" name="price" value="" checked /> All</label>
            <label><input type="radio" name="price" value="5000-10000" /> 5000 ~ 10000</label>
            <label><input type="radio" name="price" value="10000-20000" /> 10000 ~ 20000</label>
          </div>
          <div class="filter-item">
            <h4>Remaining</h4>
            <label><input type="radio" name="remain" value="" checked /> All</label>
            <label><input type="radio" name="remain" value="high" /> High</label>
            <label><input type="radio" name="remain" value="medium" /> Medium</label>
            <label><input type="radio" name="remain" value="low" /> Low</label>
          </div>
          <button class="btn" id="apply">Apply Filter</button>
        </aside>

        <section>
          <div id="list-grid" class="grid-3"></div>
        </section>
      </section>
    </main>

    <footer class="container footer">Figma Frame: Kuji List</footer>

    <script src="assets/js/mock-data.js"></script>
    <script>
      const { kujiItems } = window.FIGU;
      const grid = document.getElementById('list-grid');
      const keyword = document.getElementById('keyword');
      const getChecked = (name) => document.querySelector(`input[name="${name}"]:checked`)?.value || '';

      const render = () => {
        const series = getChecked('series');
        const price = getChecked('price');
        const remain = getChecked('remain');
        const q = keyword.value.trim().toLowerCase();

        let list = [...kujiItems];
        if (q) list = list.filter((item) => item.title.toLowerCase().includes(q));
        if (series) list = list.filter((item) => item.series === series);
        if (price === '5000-10000') list = list.filter((item) => item.price >= 5000 && item.price <= 10000);
        if (price === '10000-20000') list = list.filter((item) => item.price > 10000 && item.price <= 20000);
        if (remain === 'high') list = list.filter((item) => item.remain >= 45);
        if (remain === 'medium') list = list.filter((item) => item.remain < 45 && item.remain >= 25);
        if (remain === 'low') list = list.filter((item) => item.remain < 25);

        grid.innerHTML = list
          .map(
            (item) => `
              <article class="kuji-card">
                <img src="${item.image}" alt="${item.title}" />
                <div class="body">
                  <span class="badge">${item.brand}</span>
                  <h3>${item.title}</h3>
                  <p class="price">₩${item.price.toLocaleString('ko-KR')}</p>
                  <p class="muted">Remaining ${item.remain} / 80</p>
                  <a class="btn" href="detail.html?id=${item.id}">View Detail</a>
                </div>
              </article>
            `
          )
          .join('');
      };

      document.getElementById('apply').addEventListener('click', render);
      keyword.addEventListener('input', render);
      render();
    </script>
  </body>
</html>
