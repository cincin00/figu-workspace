<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figu Lounge | 배송관리</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="top-header"><div class="container header-inner"><p class="brand-title">Figu Lounge</p></div></header>
    <main class="container page">
      <section class="panel">
        <h1>배송관리</h1>
        <p class="muted">묶음배송 요청, 주소 검증, ETA 안내 목업</p>
        <div class="grid-2">
          <label>수령인<input id="name" placeholder="홍길동" /></label>
          <label>연락처<input id="phone" placeholder="010-0000-0000" /></label>
          <label style="grid-column:1/-1">주소<input id="addr" placeholder="서울시 ..." /></label>
        </div>
        <p class="muted">예상 배송비 3,500원 · 평균 3~7일 소요</p>
        <button class="btn" id="ship-btn">출고 요청</button>
        <p id="ship-msg" class="muted"></p>
      </section>
    </main>
    <script src="assets/js/mock-data.js"></script>
    <script>
      const { addShipping } = window.FIGU;
      document.getElementById('ship-btn').addEventListener('click', () => {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const addr = document.getElementById('addr').value.trim();
        if (!name || !phone || !addr) {
          document.getElementById('ship-msg').textContent = '모든 항목을 입력해주세요.';
          return;
        }
        addShipping({ name, phone, addr, createdAt: new Date().toISOString() });
        document.getElementById('ship-msg').textContent = '출고 요청이 접수되었습니다.';
      });
    </script>
  </body>
</html>
