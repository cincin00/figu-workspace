<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figu Lounge | Shipping</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="top-header">
      <div class="container header-inner">
        <div class="header-row">
          <p class="logo">FIGU LOUNGE</p>
          <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="mypage.html">My Lounge</a>
            <a href="shipping.html" class="active">Shipping</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="container page">
      <p class="kicker">URL /my/shipping</p>
      <h1>Shipping Page</h1>

      <section class="panel">
        <h3>Shipping Address</h3>
        <div class="grid-2">
          <label>수령인 <input id="name" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:8px" /></label>
          <label>연락처 <input id="phone" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:8px" /></label>
          <label style="grid-column:1/-1">주소 <input id="addr" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:8px" /></label>
        </div>
      </section>

      <section class="panel" style="margin-top:14px">
        <h3>Saved Items</h3>
        <div id="saved-items" class="muted"></div>
        <p class="price">Shipping Fee ₩3,500</p>
        <button class="btn" id="ship-btn">Request Shipping</button>
        <p id="ship-msg" class="muted"></p>
      </section>
    </main>

    <footer class="container footer">Figma Frame: Shipping</footer>

    <script src="assets/js/mock-data.js"></script>
    <script>
      const { getInventory, addShipping } = window.FIGU;
      const saved = getInventory();
      document.getElementById('saved-items').innerHTML = saved.length
        ? saved.map((item, index) => `<p><input type="checkbox" checked /> Item ${index + 1} · ${item.reward}</p>`).join('')
        : '<p>저장된 아이템이 없습니다.</p>';

      document.getElementById('ship-btn').addEventListener('click', () => {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const addr = document.getElementById('addr').value.trim();
        if (!name || !phone || !addr) {
          document.getElementById('ship-msg').textContent = '배송지 정보를 모두 입력해주세요.';
          return;
        }
        addShipping({ name, phone, addr, createdAt: new Date().toISOString() });
        document.getElementById('ship-msg').textContent = '배송 요청이 접수되었습니다.';
      });
    </script>
  </body>
</html>
