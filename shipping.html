<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figu Lounge | 배송관리</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="top-header"><div class="container header-inner"><p class="brand-title">Figu Lounge</p></div></header>
    <main class="container page">
      <section class="panel">
        <h1>배송관리</h1>
        <p class="muted">묶음배송 요청, 주소 검증, ETA 안내 목업</p>
        <div class="grid-2">
          <label>수령인<input id="name" placeholder="홍길동" /></label>
          <label>연락처<input id="phone" placeholder="010-0000-0000" /></label>
          <label style="grid-column:1/-1">주소<input id="addr" placeholder="서울시 ..." /></label>
        </div>
        <p class="muted">예상 배송비 3,500원 · 평균 3~7일 소요</p>
        <button class="btn" id="ship-btn">출고 요청</button>
        <p id="ship-msg" class="muted"></p>
      </section>
      <section class="panel" style="margin-top: 14px">
        <h2>최근 배송 요청</h2>
        <ul id="ship-list" class="notice-list"></ul>
      </section>
    </main>
    <script src="assets/js/mock-data.js"></script>
    <script>
      const { addShipping } = window.FIGU;
      const KEY = 'figu_shipping_requests';
      const shipList = document.getElementById('ship-list');
      const render = () => {
        const data = JSON.parse(localStorage.getItem(KEY) || '[]');
        shipList.innerHTML = data.length
          ? data
              .slice()
              .reverse()
              .slice(0, 5)
              .map((v) => `<li>${v.name} · ${v.addr} (${new Date(v.createdAt).toLocaleDateString('ko-KR')})</li>`)
              .join('')
          : '<li>배송 요청 내역이 없습니다.</li>';
      };

      document.getElementById('ship-btn').addEventListener('click', () => {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const addr = document.getElementById('addr').value.trim();
        if (!name || !phone || !addr) {
          document.getElementById('ship-msg').textContent = '모든 항목을 입력해주세요.';
          return;
        }
        if (!/^01[0-9]-?\d{3,4}-?\d{4}$/.test(phone)) {
          document.getElementById('ship-msg').textContent = '연락처 형식이 올바르지 않습니다.';
          return;
        }
        addShipping({ name, phone, addr, createdAt: new Date().toISOString() });
        document.getElementById('ship-msg').textContent = '출고 요청이 접수되었습니다.';
        render();
      });

      render();
    </script>
  </body>
</html>
