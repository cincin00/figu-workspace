<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figu Lounge | 마이라운지</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body data-page="mypage">
    <header class="top-header"><div class="container header-inner"><p class="brand-title">Figu Lounge</p><nav class="main-nav"><a href="index.html">홈</a><a href="mypage.html" class="active">마이라운지</a><a href="shipping.html">배송관리</a></nav></div></header>
    <main class="container page grid-2">
      <section class="panel">
        <h2>보관 아이템</h2>
        <ul id="inv-list" class="notice-list"></ul>
      </section>
      <section class="panel">
        <h2>주문 로그</h2>
        <ul id="order-list" class="notice-list"></ul>
      </section>
    </main>

    <script src="assets/js/mock-data.js"></script>
    <script>
      const { getInventory, getOrders } = window.FIGU;
      const inv = getInventory();
      const orders = getOrders();
      document.getElementById('inv-list').innerHTML = inv.length
        ? inv.map((v) => `<li>${v.grade}상 · ${v.reward} (${v.status})</li>`).join('')
        : '<li>보관 아이템이 없습니다.</li>';
      document.getElementById('order-list').innerHTML = orders.length
        ? orders
            .slice()
            .reverse()
            .map((v) => `<li>${v.orderId} · ${v.productTitle} · ${new Date(v.createdAt).toLocaleDateString('ko-KR')}</li>`)
            .join('')
        : '<li>주문 로그가 없습니다.</li>';
    </script>
      <script src="assets/js/layout.js"></script>
  </body>
</html>
