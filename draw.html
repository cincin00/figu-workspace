<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figu Lounge | Draw</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="top-header">
      <div class="container header-inner">
        <div class="header-row">
          <p class="logo">FIGU LOUNGE</p>
          <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="kuji.html" class="active">Kuji</a>
            <a href="help.html">Support</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="container page">
      <p class="kicker">URL /draw/{id}</p>
      <h1 id="draw-title">결제 + 추첨</h1>
      <section class="grid-2">
        <article class="panel">
          <h3>Order Summary</h3>
          <p id="order-summary" class="muted"></p>
        </article>
        <article class="panel">
          <h3>Payment</h3>
          <label><input type="radio" name="pay" checked /> Card</label><br />
          <label><input type="radio" name="pay" /> KakaoPay</label><br />
          <label><input type="radio" name="pay" /> NaverPay</label>
        </article>
      </section>

      <section class="panel" style="margin-top:14px">
        <button id="pay-draw-btn" class="btn alert">Pay and Draw</button>
        <p id="draw-status" class="muted">결제 후 1.5초 추첨 애니메이션이 재생됩니다.</p>
        <div id="draw-animation" class="draw-anim" hidden>Drawing... 🎁 🎁 🎁 🎁 🎁</div>
      </section>
    </main>

    <footer class="container footer">Figma Frame: Draw</footer>

    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/draw-logic.js"></script>
  </body>
</html>
