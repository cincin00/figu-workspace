<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>피규 라운지 | 쿠지 메인</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="top-header">
      <div class="container header-inner">
        <h1>피규 라운지 <span>Figu Lounge</span></h1>
        <nav>
          <a href="index.html" class="active">홈</a>
          <a href="mypage.html">마이페이지</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <section class="hero">
        <p class="kicker">일본 직수입 신상 쿠지</p>
        <h2>지금 판매 중인 라인업</h2>
        <p>
          UI/UX 시안 확인용 목업입니다. 실시간 동기화 없이 브라우저 데이터로 재고와 추첨 결과를
          시뮬레이션합니다.
        </p>
      </section>

      <section>
        <div id="product-grid" class="product-grid"></div>
      </section>
    </main>

    <script src="assets/js/mock-data.js"></script>
    <script>
      const { products, formatPrice } = window.FIGU_DATA;
      const productGrid = document.getElementById('product-grid');

      productGrid.innerHTML = products
        .map(
          (product) => `
          <article class="card">
            <img src="${product.thumbnail}" alt="${product.title}" />
            <div class="card-body">
              <p class="badge">${product.series}</p>
              <h3>${product.title}</h3>
              <p class="price">1회 ${formatPrice(product.price)}</p>
              <a href="detail.html?id=${product.id}" class="btn">상세 보기</a>
            </div>
          </article>
        `
        )
        .join('');
    </script>
  </body>
</html>
