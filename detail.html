<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figu Lounge | 쿠지 상세</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body data-page="detail">
    <header class="top-header">
      <div class="container header-inner">
        <p class="brand-title">Figu Lounge</p>
        <nav class="main-nav"><a href="kuji.html">쿠지 리스트</a><a href="mypage.html">마이라운지</a></nav>
      </div>
    </header>

    <main class="container page" id="detail-root"></main>

    <script src="assets/js/mock-data.js"></script>
    <script>
      const { kujiItems, KRW } = window.FIGU;
      const id = new URLSearchParams(location.search).get('id');
      const item = kujiItems.find((v) => v.id === id);
      const root = document.getElementById('detail-root');

      if (!item) {
        root.innerHTML = '<p>상품이 없습니다.</p>';
      } else {
        root.innerHTML = `
          <section class="grid-2">
            <article class="panel">
              <img src="${item.image}" alt="${item.title}" style="width:100%;border-radius:10px;max-height:300px;object-fit:cover" />
              <h1 style="margin-top:12px">${item.title}</h1>
              <p class="muted">${item.brand} · 남은 수량 ${item.remain}</p>
              <p class="price">1회 ${KRW(item.price)}</p>
            </article>
            <article class="panel">
              <h3>결제 전 필수 확인</h3>
              <ul class="notice-list">
                <li>확률형 상품이며 결과는 결제 즉시 확정됩니다.</li>
                <li>배송비 포함 총비용은 결제 페이지에서 재확인됩니다.</li>
                <li>환불/청약철회 정책은 고객센터에서 확인 가능합니다.</li>
              </ul>
              <label style="display:block;margin-top:12px">수량 선택
                <input id="qty" type="number" min="1" value="1" />
              </label>
              <p id="total" class="price" style="margin-top:10px"></p>
              <a id="goto-draw" class="btn" href="#">결제하고 결과 확인</a>
            </article>
          </section>

          <section class="panel" style="margin-top:14px">
            <h3>구성/확률 테이블</h3>
            <table>
              <thead><tr><th>등급</th><th>확률</th><th>경품</th></tr></thead>
              <tbody>
                ${item.grades.map((g) => `<tr><td>${g.rank}</td><td>${g.probability}</td><td>${g.reward}</td></tr>`).join('')}
              </tbody>
            </table>
          </section>
        `;

        const qty = document.getElementById('qty');
        const total = document.getElementById('total');
        const gotoDraw = document.getElementById('goto-draw');

        const sync = () => {
          const q = Math.max(1, Number(qty.value) || 1);
          qty.value = q;
          total.textContent = `예상 총비용 ${KRW(item.price * q + 3500)} (배송비 포함)`;
          gotoDraw.href = `draw.html?id=${item.id}&qty=${q}`;
        };
        qty.addEventListener('input', sync);
        sync();
      }
    </script>
      <script src="assets/js/layout.js"></script>
  </body>
</html>
